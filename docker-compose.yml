services:

  mongo:
    image: mongo:7
    container_name: mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - api_net

  api:
    build: .
    container_name: api
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      - mongo
    volumes:
      - sqlite_data:/data
    networks:
      - api_net

volumes:
  mongo_data:
  sqlite_data:

networks:
  api_net:
    driver: bridge